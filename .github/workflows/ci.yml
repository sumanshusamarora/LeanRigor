name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm run validate:claude-plugin
      - run: git diff --check
      - run: |
          tmp="$(mktemp -d)"
          repo="$tmp/repo with spaces"
          mkdir -p "$repo"
          CLAUDE_PLUGIN_ROOT="$PWD" ./bin/leanrigor flow start "Fix a typo in README documentation" --provider deterministic --root "$repo" >/tmp/leanrigor-runtime-smoke.json
          test -f "$repo/.leanrigor/config.json"
          test -d "$repo/.leanrigor/workflows"
          test ! -e "$repo/.claude"
      - run: npm pack
      - run: |
          pkg_version="$(node -p "require('./package.json').version")"
          pkg_name="$(node -p "require('./package.json').name")"
          tgz="${pkg_name}-${pkg_version}.tgz"
          tar -tf "$tgz" | grep -E 'package/(\\.claude-plugin|commands|agents|hooks|bin|plugin-skills|runtime)/' >/dev/null
          tar -tf "$tgz" | grep '^package/commands/' | sort > /tmp/leanrigor-commands.txt
          printf '%s\n' \
            package/commands/commit.md \
            package/commands/plan.md \
            package/commands/review.md \
            package/commands/start.md \
            package/commands/status.md > /tmp/leanrigor-expected-commands.txt
          diff -u /tmp/leanrigor-expected-commands.txt /tmp/leanrigor-commands.txt
          ! tar -tf "$tgz" | grep '^package/skills/'
